name: Auto Checkout 17:30

on:
  workflow_dispatch:

jobs:
  auto-checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Call Auto Checkout API
        run: |
          curl -X GET "${{ secrets.APP_URL }}/api/cron/auto-checkout" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"